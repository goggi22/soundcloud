<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoundCloud OAuth Redirect</title>
  <style>
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: radial-gradient(circle at top, #ff5500 0%, #1b1b1b 45%);
      color: #f7f7f7;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    .card {
      width: min(520px, calc(100vw - 32px));
      background: rgba(20, 20, 20, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.25);
      padding: 32px;
      text-align: center;
    }

    .logo {
      width: 68px;
      height: 68px;
      margin: 0 auto 24px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff7a1f, #d844ff);
      box-shadow: 0 18px 45px rgba(255, 85, 0, 0.25);
    }

    .logo span {
      font-size: 32px;
      font-weight: 800;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 2rem;
      letter-spacing: -0.03em;
    }

    p {
      margin: 0 0 24px;
      line-height: 1.7;
      color: #d7d7d7;
    }

    .code-box {
      width: 100%;
      min-height: 92px;
      padding: 18px 20px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.12);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 0.95rem;
      color: #fff;
      word-break: break-all;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 16px 20px;
      font-size: 1rem;
      font-weight: 700;
      background: #ff5500;
      color: #fff;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 40px rgba(255, 85, 0, 0.25);
    }

    .hint {
      margin-top: 18px;
      color: #a8a8a8;
      font-size: 0.95rem;
    }

    .error {
      color: #ff9f9f;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><span>SC</span></div>
    <h1>SoundCloud OAuth Redirect</h1>
    <p>Скопируйте код авторизации, который SoundCloud передал в URL, и отправьте его боту.</p>

    <div class="code-box" id="codeBox">Waiting for the code ...</div>
    <button id="copyButton">Copy code</button>
    <p class="hint" id="hint">If the code is missing, make sure your SoundCloud app redirect_uri points to this page.</p>
  </div>

  <script>
    function getQueryParam(name) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(name);
    }

    const code = getQueryParam('code');
    const codeBox = document.getElementById('codeBox');
    const copyButton = document.getElementById('copyButton');
    const hint = document.getElementById('hint');

    if (code) {
      codeBox.textContent = code;
      hint.textContent = 'Нажмите кнопку, чтобы скопировать код в буфер обмена.';
    } else {
      codeBox.textContent = 'Code not found in the URL. Make sure SoundCloud redirects here with ?code=...';
      codeBox.classList.add('error');
      copyButton.disabled = true;
    }

    copyButton.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(code || '');
        copyButton.textContent = 'Copied!';
        copyButton.disabled = true;
      } catch (error) {
        hint.textContent = 'Clipboard error. Copy manually from the box above.';
      }
    });
  </script>
</body>
</html>
